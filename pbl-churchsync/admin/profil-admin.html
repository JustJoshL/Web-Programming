<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Admin ChurchSync</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .profile-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .profile-user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .big-avatar {
            width: 80px;
            height: 80px;
            background-color: var(--primary-yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .user-meta h3 {
            color: var(--primary-blue);
            font-size: 22px;
            margin-bottom: 2px;
        }

        .user-meta p {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .role-badge {
            display: inline-block;
            padding: 3px 8px;
            background-color: #dc3545;
            color: white;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-blue);
            margin-bottom: 8px;
        }

        .form-group input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background-color: #f8fafc;
            font-size: 14px;
            color: var(--text-dark);
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        .btn-logout {
            color: #dc3545;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
        }

        .btn-submit {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-logo">ChurchSync<span>ALL ABOUT OUR CHURCH</span></div>
        <nav>
            <a href="dashboard-admin.html" class="nav-link">Dashboard</a>
            <a href="pengumuman-admin.html" class="nav-link">Pengumuman</a>
            <a href="jadwal-admin.html" class="nav-link">Jadwal Ibadah</a>
            <a href="data-jemaat-admin.html" class="nav-link">Data Jemaat</a>
            <a href="laporan-admin.html" class="nav-link">Laporan Ibadah</a>
            <a href="cabang-admin.html" class="nav-link">Cabang Gereja</a>
            <a href="profil-admin.html" class="nav-link active">Profil Saya</a>
        </nav>
    </div>

    <div class="content-wrapper">
        <div class="top-navbar">
            <div class="navbar-right">
                <div class="noti-icon">🔔<span class="noti-badge"></span></div>
                <div class="user-profile-dropdown">
                    <div class="nav-avatar">⚡</div>
                    <div class="nav-user-name">Halan Walker</div>▼
                    <div class="dropdown-content"><a href="login.html">Logout</a></div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="header-toolbar" style="margin-bottom: 20px;">
                <h2>Profil Sistem Admin</h2>
            </div>

            <div class="profile-card">
                <div class="profile-user-info">
                    <div class="big-avatar">⚡</div>
                    <div class="user-meta">
                        <h3>Halan Walker</h3>
                        <p>admin.pusat@churchsync.com</p>
                        <span class="role-badge">Super Admin Pusat</span>
                    </div>
                </div>

                <form>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nama Lengkap</label>
                            <input type="text" value="Halan Walker">
                        </div>
                        <div class="form-group">
                            <label>Email Admin</label>
                            <input type="email" value="admin.pusat@churchsync.com">
                        </div>
                        <div class="form-group full-width">
                            <label>Kata Sandi Baru (Opsional)</label>
                            <input type="password" placeholder="Masukkan password baru jika ingin mengubah...">
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="login.html" class="btn-logout">Keluar dari Sistem</a>
                        <button type="button" class="btn-submit">Simpan Profil Admin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>

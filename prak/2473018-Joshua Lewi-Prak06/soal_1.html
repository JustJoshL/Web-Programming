<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="[2473018] Joshua Lewi">
    <title>[2473018]-Joshua Lewi</title>
    <style>
        .container {
            border: 2px solid black;
            padding: 15px;
            display: inline-block;
        }

        table {
            text-align: center;
            font-size: 24px;
        }

        td {
            border: 2px solid black;
            width: 60px;
            height: 40px;
        }
    </style>
</head>

<body>
    <div class="container">
        <form name="aritmatik">
            Angka Pertama : <input type="number" id="angka1" name="angka1"><br>
            Angka Kedua : <input type="number" id="angka2" name="angka2"><br>
            <input type="button" value="proses" onclick="prosesAritmatik()">
            <br><br>
        </form>
        <table>
            <tr>
                <td id="a1-tambah"></td>
                <td>+</td>
                <td id="a2-tambah"></td>
                <td>=</td>
                <td id="hasil-tambah"></td>
            </tr>
            <tr>
                <td id="a1-kurang"></td>
                <td>-</td>
                <td id="a2-kurang"></td>
                <td>=</td>
                <td id="hasil-kurang"></td>
            </tr>
        </table>
        <script>
            function prosesAritmatik() {
                let input1 = parseInt(document.getElementById("angka1").value);
                let input2 = parseInt(document.getElementById("angka2").value);
                let penjumlahan = input1 + input2;
                let pengurangan = input1 - input2;
                document.getElementById("a1-tambah").innerHTML = input1;
                document.getElementById("a2-tambah").innerHTML = input2;
                document.getElementById("hasil-tambah").innerHTML = penjumlahan;
                document.getElementById("a1-kurang").innerHTML = input1;
                document.getElementById("a2-kurang").innerHTML = input2;
                document.getElementById("hasil-kurang").innerHTML = pengurangan;
            }
        </script>
    </div>
</body>

</html>

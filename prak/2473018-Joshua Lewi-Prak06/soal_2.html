<body>
    <div id="tabel"></div>
    <script>
        function buatTabel(angka) {
            let tabel = "<table>";
            for (var i = 1; i <= angka; i++) {
                var hasil = angka * i;
                tabel += "<tr>";
                tabel += "<td>" + i + "</td>";
                tabel += "<td>" + " x " + "</td>";
                tabel += "<td>" + angka + "</td>";
                tabel += "<td>" + " = " + "</td>";
                tabel += "<td>" + hasil + "</td>";
                tabel += "</tr>";
            }
            tabel += "</table>";
            document.getElementById("tabel").innerHTML = tabel;
            return tabel;
        }

        function multiplication() {
            do {
                var popUp = prompt("A number?");
                angka = parseInt(popUp);
            } while (isNaN(angka));
            tabelAkhir = buatTabel(angka);
        }

        window.onload = multiplication;
    </script>

</body>

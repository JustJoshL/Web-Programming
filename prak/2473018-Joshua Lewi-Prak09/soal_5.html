        $(document).ready(function () {
            $("#search-box").on("input", function () {
                var cari = $(this).val();
                $("#daftar-perusahaan div").css("color", "black");
                if (cari !== "") {
                    $("#daftar-perusahaan div:contains('" + cari + "')").css("color", "red");
                }
            });
        });
    </script>

    <style>
        ol {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li.item {
            float: left;
            width: 150px;
            background-color: #ff1493;
            text-decoration: underline;
            color: white;
            cursor: pointer;
            padding: 5px;
            margin-right: 5px;
        }

        li.item ol {
            background-color: white;
            color: black;
            border: 1px solid #ff1493;
            margin-top: 5px;
            width: 150px;
        }

        li.item ol li {
            padding: 2px 2px;
            text-decoration: underline;
        }
    </style>
    <script type="text/javascript" src="jquery-4.0.0.min.js"></script>
    <script>
        $(document).ready(function () {
            $("li.item ol").hide();
            $(".item").hover(function () {
                $(this).find("ol").show();
            }, function () {
                $(this).find("ol").hide();
            });
        });
    </script>
</head>

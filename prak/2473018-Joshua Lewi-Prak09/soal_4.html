<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="[2473018] Joshua Lewi">
    <title>[2473018]-Joshua Lewi</title>
    <script src="jquery-4.0.0.min.js"></script>
    <script>
        $(document).ready(function () {
            $(".header").change(function () {
                var isChecked = $(this).prop("checked");
                if (isChecked) {
                    $("input:checkbox.body").prop("checked", true);
                } else {
                    $("input:checkbox.body").prop("checked", false);
                }
            });
        });
    </script>
</head>

<body>
    <table border="1" cellpadding="0" cellspacing="0">
        <tr>
            <td width="50" align="center">
                <input class="header" type="checkbox" /><br />
                <hr />
                <input class="body" type="checkbox" /><br />
                <input class="body" type="checkbox" /><br />
                <input class="body" type="checkbox" /><br />
                <input class="body" type="checkbox" /><br />
            </td>
        </tr>
    </table>
</body>

</html>

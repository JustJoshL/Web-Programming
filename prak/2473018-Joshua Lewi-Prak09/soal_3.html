<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="[2473018] Joshua Lewi">
    <title>[2473018]-Joshua Lewi</title>
    <style>
        div {
            width: 40px;
            height: 40px;
            margin: 5px;
            float: left;
            border: 2px blue solid;
            text-align: center;
        }

        span {
            color: red;
        }
    </style>
    <script src="jquery-4.0.0.min.js"></script>
    <script>
        $(document).ready(function () {
            $("button").click(function () {
                $("div").each(function (index, domEle) {
                    if ($(domEle).attr("id") === "stop-disini") {
                        return false;
                    } else {
                        $(domEle).css("background-color", "yellow");
                    }
                });
            });
            $("div").click(function () {
                $(this).css("background-color", "red");
                $(this).attr("id", "stop-disini");
            });
        });
    </script>
</head>

<body>
    <button>Change colors</button>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
</body>

</html>

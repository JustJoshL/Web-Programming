<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="[2473018] Joshua Lewi">
    <title>Soal 2 - Personal Data</title>
</head>

<body>
    <form action="proses.html">
    <table style="border: 2px solid black; width: 300px;">
        <tr style="background-color: gray; color: white; text-align: center;">
            <td>
                Personal Data
            </td>
        </tr>
        <tr>
            <td>
                <table>
                    <tr>
                        <td>
                            Name
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            Alamat
                        </td>
                        <td>
                            <input type="textarea">
                        </td>
                    </tr>
                    <tr>
                        <td>Jenis Kelamin</td>
                        <td>
                            <input id="lk" type="radio" name="jk/" value="laki">Laki-Laki <br>
                            <input id="pr" type="radio" name="jk/" value="perempuan">Perempuan
                        </td>
                    </tr>
                    <tr>
                        <td>Tanggal Lahir</td>
                        <td>
                            <select name="tanggal" id="tanggal">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                            </select> -
                            <select name="bulan" id="bulan">
                                <option value="1">Januari</option>
                                <option value="2">Februari</option>
                                <option value="3">Maret</option>
                            </select> -
                            <select name="tahun" id="tahun">
                                <option value="1">1980</option>
                                <option value="2">1981</option>
                                <option value="3">1982</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Jurusan</td>
                        <td>
                            <select name="jurusan" id="" multiple="multiple" size="3">
                                <option value="1">Teknik Informatika</option>
                                <option value="2">Sistem Informasi</option>
                                <option value="3">Elektro</option>
                                <option value="4">Sipil</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <fieldset>
                                <legend>Hobi</legend>
                                <table style="width: 300px;">
                                    <tr>
                                        <td>
                                            <input type="checkbox" name="hobi" value="membaca">Membaca
                                            <br>
                                            <input type="checkbox" name="hobi" value="menulis">Menulis
                                            <br>
                                            <input type="checkbox" name="hobi" value="catur">Catur
                                            <br>
                                        </td>
                                        <td>
                                            <input type="checkbox" name="hobi" value="voli">Voli
                                            <br>
                                            <input type="checkbox" name="hobi" value="badminton">Badminton
                                            <br>
                                            <input type="checkbox" name="hobi" value="golf">Golf
                                        </td>
                                    </tr>
                                </table>
                            </fieldset>
                        </td>
                    </tr>
                    <tr style="text-align: right;">
                        <td colspan="2">
                            <hr>
                            <button type="submit" value="submit">Submit</button>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
    </form>
</body>

</html>

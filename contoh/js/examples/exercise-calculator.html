<html>
<head>
<script type="text/javascript">
var operator;
function count(op)
{
	operator = op;
}

function result()
{
	if(operator == "+"){
		document.myform.re.value = parseInt(document.myform.op1.value) + parseInt(document.myform.op2.value);
	}else if(operator == "-"){
		document.myform.re.value = parseInt(document.myform.op1.value) - parseInt(document.myform.op2.value);
	}else if(operator == "/"){
		document.myform.re.value = parseInt(document.myform.op1.value) / parseInt(document.myform.op2.value);
	}else if(operator == "*"){
		document.myform.re.value = parseInt(document.myform.op1.value) * parseInt(document.myform.op2.value);
	}
}
</script>
</head>

<body>
<form name="myform">
<table>
<tr>
	<td><input type="text" maxlength="3" name="op1" size="3"/></td>
	<td>
		<input type="button" value="+" onclick="count('+')"/></br>
		<input type="button" value="-" onclick="count('-')"/></br>
		<input type="button" value="/" onclick="count('/')"/></br>
		<input type="button" value="*" onclick="count('*')"/>
	</td>
	<td>
		<input type="text" maxlength="3" name="op2" size="3"/>
	</td>
	<td>
		<input type="button" value="=" onclick="result()"/>
	</td>
	<td>
		<input type="text" maxlength="3" name="re" size="6"/>
	</td>
</tr>
</table>
</form>
</body>
</html>

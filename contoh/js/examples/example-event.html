<html>
	<head>
		<script type="text/javascript">
			function call_onload(){
				alert("welcome");
			}
			
			function call_onUnload(){
				alert("bye bye..");
			}
			
			function call_onMouseOverOut(flag){
				if(flag)
					document.imgArrow.src="down.png";
				else
					document.imgArrow.src="up.png";
			}
			
			function call_onSubmit(){
				if(document.myform.tiName.value == ""){
					document.getElementById("lab").style.display = "inline";
				}else{
					document.getElementById("lab").style.display = "none";
				}
				return false;
			}
		</script>
	</head>
	<body onLoad="call_onload()" onUnload="call_onUnload()">
		Please MouseOver and MouseOut the image
		<a href="http://www.google.co.id" onMouseOver="call_onMouseOverOut(true)" onMouseOut="call_onMouseOverOut(false)"><img name="imgArrow" src="up.png" alt="W3Schools" /></a>
		<hr/>
		<form name="myform" onSubmit="return call_onSubmit()" action="proses.html">
			Phone Number : <input name="tiName" type="text" /><br/>
			<input type="Submit" value="Send"/>
			<label id="lab" style="display:none">please enter phone number</label>
		</form>
	</body>
</html>

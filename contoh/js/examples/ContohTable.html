<html>
	<head>
		<script type="text/javascript">
			document.write("<table border='0'>");
			for (i = 0; i < 5; i++) {
				//baris - tr
				document.write("<tr>");
				for (j = 0; j < 5; j++) {
					//kolom - td
					if (j % 3 == 0) {
						document.write("<td bgcolor='orange' style='width: 50px; height: 50px;'></td>");
					} else {
						document.write("<td bgcolor='white' style='width: 50px; height: 50px;'></td>");
					}
				}
				document.write("</tr>");
			}
			document.write("</table>");
		</script>
	</head>
	<body>
	</body>
</html>

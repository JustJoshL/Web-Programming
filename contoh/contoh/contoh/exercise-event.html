<html>
	<head>
		<script type="text/javascript">
			function call_onKeyPress(){
				document.myform.txt2.value=document.myform.txt1.value;
			}
		</script>
	</head>
	<body><center>
		<form name="myform">
			Text 1 : <input type="text" name="txt1" size="50" maxlength="40" onkeyup="call_onKeyPress()" onkeydown="call_onKeyPress()"/><br/>
			Text 2 : <input type="text" name="txt2" size="50" maxlength="40"/>
		</form>
	</center></body>
</html>

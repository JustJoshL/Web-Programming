<html>
	<head>
		<script type="text/javascript">
			function call_onLoad(){
				var today=new Date();
				var h=today.getHours();
				var m=today.getMinutes();
				var s=today.getSeconds();
				document.write(h+" : "+m+" : "+s+"<br/>");
			}
		</script>
	</head>
	<body onLoad="call_onLoad()">
	
	</body>
</html>
